<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Pedro</title>

<style>
    body {
        background-color: black;
        color: #00ff55;
        font-family: "Consolas", monospace;
        font-size: 22px;
        padding: 20px;
    }

    #texto {
        white-space: pre-line;
        line-height: 1.4;
        min-height: 300px;
    }

    .hidden {
        opacity: 0;
    }
</style>
</head>

<body>

<audio id="startSound" src="start.mp3"></audio>
<audio id="endSound" src="end.mp3"></audio>

<div id="texto"></div>

<script>
    const t = document.getElementById("texto");
    const startSound = document.getElementById("startSound");
    const endSound = document.getElementById("endSound");

    function digitar(texto, velocidade = 35) {
        return new Promise(resolve => {
            let i = 0;
            t.innerHTML = "";
            const intervalo = setInterval(() => {
                t.innerHTML += texto[i];
                i++;
                if (i >= texto.length) {
                    clearInterval(intervalo);
                    resolve();
                }
            }, velocidade);
        });
    }

    function esperar(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function animar() {

        startSound.play();

        await digitar("Sistema iniciado....\nArquivo.pedro.py ligado.");
        await esperar(10000);

        t.innerHTML = "";
        await esperar(1000);

        await digitar(
`Ta gravando?.. ah foi mal, bom dia pro 1 A, especialmente para uma garota que não vou cita, enfim.

Querida desconhecida, cara desconhecida e horrível K, pra não toma seu tempo professor Ricardo vou ser direto:

Desculpa por incomodar você as férias inteiras e desculpa por não ser corajoso (carai sou muito medroso-)

Enfim enfim, era só isso.`
        );

        await esperar(10000);

        t.innerHTML = "";
        await esperar(1000);

        endSound.play();
        await digitar("Sistema terminado..\nNÃO É O PEDRO DO 1 C!, bye");
    }

    animar();
</script>

</body>
  </html>
